# IdPVault - self-contained stack. Deploy as a Portainer stack or plain compose.
#
# ZERO CONFIG: `docker compose up -d` is all it takes. No pre-created folders,
# no pre-seeded files. On first boot the app generates its master encryption
# key inside the idpvault_secrets volume - BACK IT UP afterwards (Docs ->
# Deployment & proxy); without it, encrypted snapshots are unrecoverable.
#
# Recommended (not required): set POSTGRES_PASSWORD in the stack environment.
# The database is only reachable inside this stack's private network, but a
# unique password is good hygiene: e.g.  openssl rand -hex 24
#
# Prefer host bind mounts over named volumes? Replace the three volume names
# below with host paths (e.g. /volume1/docker/idpvault/data:/data) - the app
# fixes ownership itself on boot. Nothing else changes.
services:
  idpvault:
    image: ghcr.io/keltech-services/idpvault:latest
    container_name: idpvault
    restart: unless-stopped
    ports:
      - "8480:8080"
    environment:
      IDPVAULT_DATABASE_URL: postgresql+psycopg://idpvault:${POSTGRES_PASSWORD:-idpvault-internal}@idpvault-db:5432/idpvault
      IDPVAULT_DATA_DIR: /data
      IDPVAULT_MASTER_KEY_FILE: /secrets/master.key
      IDPVAULT_LOG_LEVEL: INFO
      # Run as your own user/group ids instead of the default 10001 - handy when
      # bind mounts are owned by your NAS user:
      # PUID: "1026"
      # PGID: "100"
      # Backups run one at a time by default (safe for modest hosts).
      # IDPVAULT_BACKUP_WORKERS: "4"
      # First run shows a browser setup wizard to create the admin - no creds needed here.
      # For headless/automated provisioning instead, uncomment and set both:
      # IDPVAULT_ADMIN_USER: admin
      # IDPVAULT_ADMIN_PASSWORD: change-me
    volumes:
      - idpvault_data:/data
      - idpvault_secrets:/secrets
    depends_on:
      idpvault-db:
        condition: service_healthy

  idpvault-db:
    image: postgres:16-alpine
    container_name: idpvault-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: idpvault
      POSTGRES_USER: idpvault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-idpvault-internal}
    volumes:
      - idpvault_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idpvault"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  idpvault_data:
  idpvault_secrets:
  idpvault_postgres:
