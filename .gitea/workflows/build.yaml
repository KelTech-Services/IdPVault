name: build
on:
  push:
    branches: [main]
jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: >
          docker run --rm -v "$PWD":/src -w /src/backend python:3.12-slim
          sh -c "pip install -q -r requirements.txt pytest &&
          python -m pytest tests -q"
      - name: Build image
        run: docker build -f docker/Dockerfile -t gitea.keltech.ai/keltech/idpvault:latest .
      - name: Push to Gitea registry
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | docker login gitea.keltech.ai -u KelTech --password-stdin
          docker push gitea.keltech.ai/keltech/idpvault:latest
