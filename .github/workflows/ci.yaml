name: CI

on:
  push:
    branches: [main]
  pull_request:

# Default to read-only; jobs that need more (packages, releases) declare it themselves.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest
      - name: Run tests
        run: cd backend && python -m pytest tests -q

  build:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tags (version tag is write-once)
        id: v
        run: |
          v=$(grep -oE 'version="[0-9.]+"' backend/app/main.py | head -1 | cut -d'"' -f2)
          if [ -n "$v" ] && ! git ls-remote --tags origin "refs/tags/v$v" | grep -q .; then
            echo "tags=ghcr.io/keltech-services/idpvault:latest,ghcr.io/keltech-services/idpvault:v$v" >> "$GITHUB_OUTPUT"
          else
            echo "tags=ghcr.io/keltech-services/idpvault:latest" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.v.outputs.tags }}

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Version, existing-tag check, and notes from CHANGELOG
        id: rel
        run: |
          v=$(grep -oE 'version="[0-9.]+"' backend/app/main.py | head -1 | cut -d'"' -f2)
          echo "version=$v" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/v$v" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
          awk -v v="$v" 'index($0, "## ["v"]")==1 {f=1; next} /^## \[/ {f=0} f' CHANGELOG.md > notes.md
          [ -s notes.md ] || echo "See CHANGELOG.md." > notes.md
      - name: Publish release
        if: steps.rel.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${{ steps.rel.outputs.version }}" --title "v${{ steps.rel.outputs.version }}" --notes-file notes.md
