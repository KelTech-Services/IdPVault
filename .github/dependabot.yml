version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    groups:
      python-deps:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]
  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
      day: monday
    ignore:
      # The Python runtime is pinned deliberately; majors are a manual decision.
      - dependency-name: python
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
